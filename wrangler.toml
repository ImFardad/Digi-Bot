name = "digi-bot"
main = "src/index.js"
compatibility_date = "2024-06-01"
compatibility_flags = [ "nodejs_compat" ]

# Bind Cloudflare Workers AI
[ai]
binding = "AI"

# Cron Triggers - Runs every minute to check for due reminders
[triggers]
crons = [ "* * * * *" ]

# D1 Database Bindings
# Replace database_id with your own after running: wrangler d1 create digi-bot-db
[[d1_databases]]
binding = "DB"
database_name = "digi-bot-db"
database_id = "YOUR_DATABASE_ID_HERE"
migrations_dir = "migrations"
