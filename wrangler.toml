name = "digibot"
main = "src/index.js"
compatibility_date = "2024-06-01"
compatibility_flags = [ "nodejs_compat" ]

# Bind Cloudflare Workers AI
[ai]
binding = "AI"

# Cron Triggers - Runs every minute to check for due reminders
[triggers]
crons = [ "* * * * *" ]

# NOTE: D1 Database Binding must be configured manually in the Cloudflare Dashboard:
# Workers & Pages -> select 'digibot' -> Settings -> Bindings -> Add D1 Database binding
# Name the variable 'DB' and select your 'digi-bot-db' database.
